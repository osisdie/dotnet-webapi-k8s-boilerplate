name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal --filter "FullyQualifiedName!~CoreFX.Caching.Redis&FullyQualifiedName!~Hello8.Domain.SDK.Tests.Cache_Test"
      env:
        ASPNETCORE_ENVIRONMENT: Development
        COREFX_API_NAME: hello8-api
